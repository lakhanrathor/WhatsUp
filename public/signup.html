<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<link rel="stylesheet"
href="./css/auth.css">

</head>

<body>

<div class="auth-container">

<h1>WhatsUp</h1>

<input
type="text"
id="username"
placeholder="Username"
>

<input
type="email"
id="email"
placeholder="Email"
>

<input
type="password"
id="password"
placeholder="Password"
>

<button id="signupBtn">
Signup
</button>

<p>

Already have account?

<a href="login.html">
Login
</a>

</p>

</div>

<script src="./js/signup.js">
</script>

</body>
</html>
